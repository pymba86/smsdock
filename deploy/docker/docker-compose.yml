services:
  api:
    build:
      context: ../..
      dockerfile: packages/api/Dockerfile
    container_name: smsdock-api
    restart: unless-stopped
    environment:
      SMSDOCK_HTTP_ADDR: :8080
      SMSDOCK_DB_PATH: /var/lib/smsdock/smsdock.db
      SMSDOCK_DEVICE_GLOBS: /dev/serial/by-id/*,/dev/ttyUSB*
    volumes:
      - smsdock-data:/var/lib/smsdock
    # Edit devices for your VM. Prefer stable by-id or udev aliases.
    # devices:
    #   - /dev/serial/by-id/usb-Your_Modem_01:/dev/serial/by-id/usb-Your_Modem_01
    #   - /dev/serial/by-id/usb-Your_Modem_02:/dev/serial/by-id/usb-Your_Modem_02
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ../..
      dockerfile: packages/web/Dockerfile
      args:
        VITE_API_BASE: ""
    container_name: smsdock-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8081:80"

volumes:
  smsdock-data:

